<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #7c6fff; }
    p.sub { font-size: 13px; color: #666; margin-bottom: 32px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c6fff; }
    button {
      width: 100%;
      background: #7c6fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.85; }
    .erro {
      background: #ff4d4d18;
      color: #ff6b6b;
      border: 1px solid #ff4d4d30;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Type<span>Redirect</span></div>
    <p class="sub">Acesse o painel de gerenciamento</p>

    <div id="erro" class="erro" style="display:none">Usuário ou senha incorretos.</div>

    <form method="POST" action="/painel/login">
      <label>Usuário</label>
      <input type="text" name="usuario" autocomplete="username" required>
      <label>Senha</label>
      <input type="password" name="senha" autocomplete="current-password" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(window.location.search).get('erro')) {
      document.getElementById('erro').style.display = 'block';
    }
  </script>
</body>
</html>
