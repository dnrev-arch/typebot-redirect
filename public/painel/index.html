<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — TypeRedirect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: #7c6fff; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .btn-logout { font-size: 12px; color: #666; text-decoration: none; }
    .btn-logout:hover { color: #aaa; }

    main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

    .form-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .form-card h3 { font-size: 14px; color: #888; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 12px; align-items: end; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: #666; }
    input[type=text], input[type=url], input[type=number] {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 9px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: #7c6fff; }
    .btn-primary {
      background: #7c6fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      height: 38px;
    }
    .btn-primary:hover { opacity: 0.85; }

    .links-list { display: flex; flex-direction: column; gap: 10px; }
    .link-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .link-item.inativo { opacity: 0.5; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.off { background: #666; }
    .link-info { flex: 1; min-width: 0; }
    .link-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .link-url {
      font-size: 12px;
      color: #7c6fff;
      cursor: pointer;
      word-break: break-all;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .link-meta { font-size: 11px; color: #555; margin-top: 3px; }
    .link-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sm:hover { background: #252525; color: #fff; }
    .btn-sm.danger:hover { border-color: #ff4d4d55; color: #ff6b6b; }
    .btn-sm.toggle-on { border-color: #22c55e44; color: #22c55e; }
    .btn-sm.toggle-off { border-color: #ff4d4d44; color: #ff6b6b; }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #444;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: #aaa;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { border-color: #22c55e44; color: #22c55e; }

    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .modal table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .modal th { text-align: left; color: #555; padding: 6px 0; border-bottom: 1px solid #2a2a2a; }
    .modal td { padding: 7px 0; border-bottom: 1px solid #1f1f1f; color: #aaa; }
    .btn-close { margin-top: 16px; width: 100%; }
  </style>
</head>
<body>

<header>
  <div class="logo">Type<span>Redirect</span></div>
  <div class="header-right">
    <a href="/painel/logout" class="btn-logout">Sair</a>
  </div>
</header>

<main>
  <h2>Gerenciar Links</h2>

  <div class="form-card">
    <h3>Novo Link</h3>
    <div class="form-row">
      <div class="field">
        <label>Nome / Identificação</label>
        <input type="text" id="inp-label" placeholder="Ex: Type 01 — Aula de abertura">
      </div>
      <div class="field">
        <label>URL do Typebot</label>
        <input type="url" id="inp-url" placeholder="https://typebot.io/seu-bot">
      </div>
      <div class="field">
        <label>Dias de bloqueio</label>
        <input type="number" id="inp-dias" value="20" min="1" max="365">
      </div>
    </div>
    <div style="margin-top: 12px; text-align: right;">
      <button class="btn-primary" onclick="criarLink()">+ Criar link</button>
    </div>
  </div>

  <div class="links-list" id="lista"></div>
</main>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-titulo">Acessos</h3>
    <table>
      <thead><tr><th>Fingerprint</th><th>Último acesso</th><th>Total</th></tr></thead>
      <tbody id="modal-body"></tbody>
    </table>
    <button class="btn-primary btn-close" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
let linksData = [];

async function carregar() {
  const r = await fetch('/api/links');
  linksData = await r.json();
  renderizar();
}

function renderizar() {
  const lista = document.getElementById('lista');
  if (!linksData.length) {
    lista.innerHTML = '<div class="empty">Nenhum link criado ainda. Crie o primeiro acima!</div>';
    return;
  }
  lista.innerHTML = linksData.map(l => `
    <div class="link-item ${!l.active ? 'inativo' : ''}" id="item-${l.id}">
      <div class="status-dot ${l.active ? 'on' : 'off'}"></div>
      <div class="link-info">
        <div class="link-label">${l.label}</div>
        <div class="link-url" onclick="copiarUrl('${l.url_gerada}')">${l.url_gerada}</div>
        <div class="link-meta">${l.block_days} dias de bloqueio &nbsp;·&nbsp; ${l.total_leads || 0} leads registrados &nbsp;·&nbsp; Criado ${formatarData(l.created_at)}</div>
      </div>
      <div class="link-actions">
        <button class="btn-sm" onclick="verStats('${l.id}', '${l.label}')">Stats</button>
        <button class="btn-sm ${l.active ? 'toggle-off' : 'toggle-on'}" onclick="toggleLink('${l.id}', ${!l.active})">
          ${l.active ? 'Desativar' : 'Ativar'}
        </button>
        <button class="btn-sm danger" onclick="deletarLink('${l.id}')">Deletar</button>
      </div>
    </div>
  `).join('');
}

async function criarLink() {
  const label = document.getElementById('inp-label').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const dias = document.getElementById('inp-dias').value;
  if (!label || !url) return toast('Preencha o nome e a URL do Typebot', false);

  const r = await fetch('/api/links', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label, typebot_url: url, block_days: dias })
  });
  const data = await r.json();
  document.getElementById('inp-label').value = '';
  document.getElementById('inp-url').value = '';
  toast('Link criado! URL copiada.', true);
  await carregar();
  copiarUrl(data.url_gerada);
}

async function toggleLink(id, ativo) {
  await fetch(`/api/links/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ active: ativo })
  });
  await carregar();
}

async function deletarLink(id) {
  if (!confirm('Deletar este link e todos os registros de acesso? Não tem como desfazer.')) return;
  await fetch(`/api/links/${id}`, { method: 'DELETE' });
  toast('Link deletado', true);
  await carregar();
}

async function verStats(id, label) {
  const r = await fetch(`/api/links/${id}/stats`);
  const data = await r.json();
  document.getElementById('modal-titulo').textContent = `Acessos — ${label}`;
  const body = document.getElementById('modal-body');
  if (!data.length) {
    body.innerHTML = '<tr><td colspan="3" style="color:#555;padding-top:12px">Nenhum acesso registrado ainda.</td></tr>';
  } else {
    body.innerHTML = data.map(a => `
      <tr>
        <td>${a.fingerprint}</td>
        <td>${formatarData(a.ultimo_acesso)}</td>
        <td>${a.total_acessos}x</td>
      </tr>
    `).join('');
  }
  document.getElementById('modal-bg').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function copiarUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('URL copiada!', true));
}

function formatarData(d) {
  return new Date(d).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function toast(msg, ok) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (ok ? ' ok' : '');
  setTimeout(() => el.className = 'toast', 2800);
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

carregar();
</script>
</body>
</html>
